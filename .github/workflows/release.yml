name: release
on:
  push:
    branches:
      - trunk
    paths-ignore:
      - README.md
      - LICENSE
  pull_request:
    branches:
      - trunk
    paths-ignore:
      - README.md
      - LICENSE
  schedule:
    - cron: '10 16 * * 2'
  repository_dispatch:
    types: [release]
jobs:
  container:
    runs-on: ubuntu-latest
    concurrency: container
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: docker login
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: setup qemu
        uses: docker/setup-qemu-action@v1
      - name: docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v1
      - name: available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}
      - name: cache buildx
        uses: actions/cache@v3.0.1
        with:
          path: ~/.buildx
          key: ${{ runner.os }}-buildx-${{ hashFiles('**/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: build
        run: >-
          docker buildx build
          --cache-from type=local,src=$HOME/.buildx
          --cache-to   type=local,dest=$HOME/.buildx,mode=max
          --platform linux/amd64,linux/arm64
          --tag ghcr.io/${{ github.repository }}:${{ github.sha }}
          --tag ghcr.io/${{ github.repository }}:latest
          --push .
  rpmbuild:
    needs: [container]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - spec: retry
            platform: linux/amd64
          - spec: ferm
            platform: linux/amd64
          - spec: amazon-ec2-utils
            platform: linux/amd64
          - spec: amazon-ec2-net-utils
            platform: linux/amd64
          - spec: tmux
            platform: linux/amd64
          - spec: tmux
            platform: linux/arm64
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: docker login
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: set up qemu
        if: ${{ matrix.platform == 'linux/arm64' }}
        uses: docker/setup-qemu-action@v1
        with:
          image: tonistiigi/binfmt:latest
          platforms: "arm64"
      - name: container
        run: |
          docker pull --platform ${{ matrix.platform }}  ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
      - name: build
        run: |
          ./manage build ${{ matrix.spec }}
        env:
          PLATFORM: ${{ matrix.platform }}
      - name: upload rpms
        uses: actions/upload-artifact@v3
        with:
            retention-days: 5
            name: assets
            path: |
              RPMS/*.rpm
              SRPMS/*.rpm
  release:
    needs: [rpmbuild]
    concurrency: release
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: install rpmsign
        run: sudo apt-get install -y rpm
      - name: configure gpg key
        run: echo "$PGP_PRIVATE_KEY_SECURITY" | gpg --import
        env:
          PGP_PRIVATE_KEY_SECURITY: ${{ secrets.PGP_PRIVATE_KEY_SECURITY }} 
      - name: download rpms
        uses: actions/download-artifact@v2
        with:
          name: assets
      - name: sign rpms
        run: rpmsign --addsign --key-id=security@escapace.com RPMS/*.rpm SRPMS/*.rpm
      - name: download repository
        run: aws --region "${AWS_REGION}" s3 sync "s3://${AWS_BUCKET}" repository
        env:
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }} 
          AWS_REGION: ${{ secrets.AWS_REGION }} 
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }} 
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      - name: update repository
        run: ./manage update-repository
      - name: upload repository
        run: aws --region "${AWS_REGION}" s3 sync repository "s3://${AWS_BUCKET}" 
        env:
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }} 
          AWS_REGION: ${{ secrets.AWS_REGION }} 
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }} 
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
