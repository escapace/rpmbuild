name: release
on:
  push:
    branches:
      - trunk
    paths-ignore:
      - README.md
      - LICENSE
  pull_request:
    branches:
      - trunk
    paths-ignore:
      - README.md
      - LICENSE
  schedule:
    - cron: '10 16 * * 2'
  repository_dispatch:
    types: [release]
jobs:
  container:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2
      - name: docker login
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: setup qemu
        uses: docker/setup-qemu-action@v1
      - name: docker buildx
        id: buildx
        uses: docker/setup-buildx-action@v1
      - name: available platforms
        run: echo ${{ steps.buildx.outputs.platforms }}
      - name: cache buildx
        uses: actions/cache@v2.1.7
        with:
          path: ~/.buildx
          key: ${{ runner.os }}-node-${{ hashFiles('**/Dockerfile') }}
          restore-keys: |
            ${{ runner.os }}-buildx-
      - name: build
        run: >-
          docker buildx build
          --cache-from type=local,src=$HOME/.buildx
          --cache-to   type=local,dest=$HOME/.buildx,mode=max
          --platform linux/amd64,linux/arm64/v8
          --tag ghcr.io/${{ github.repository }}:${{ github.sha }}
          --push .
  rpmbuild:
    needs: [container]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        spec:
        - ferm
        - lua-filesystem
        - tmux
        - zsh
        - ec2-utils
        - amazon-ec2-net-utils
    steps:
      - name: checkout
        uses: actions/checkout@v2
      - name: docker login
        uses: docker/login-action@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: container
        run: |
          docker pull ghcr.io/${{ github.repository }}:${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:${{ github.sha }} ghcr.io/${{ github.repository }}:latest
      - name: build
        run: |
          ./manage build ${{ matrix.spec }}
      - name: upload rpms
        uses: actions/upload-artifact@v2
        with:
            retention-days: 5
            name: assets
            path: |
              RPMS/*.rpm
              SRPMS/*.rpm
  release:
    needs: [rpmbuild]
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v2
      - name: setup node
        uses: actions/setup-node@v2.5.1
        with:
          node-version: 16
      - name: cache node
        uses: actions/cache@v2.1.7
        with:
          path: ~/.pnpm-store
          key: ${{ runner.os }}-node-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: install dependencies
        run: |
          npm install -g pnpm
          pnpm install
      - name: download rpms
        uses: actions/download-artifact@v2
        with:
          name: assets
      - name: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
